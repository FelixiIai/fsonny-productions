<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 520" width="360" height="520">
  <defs>
    <pattern id="dotsF" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.3" cy="1.3" r="1.1" fill="#1e4b38" opacity="0.16"/>
    </pattern>
    <linearGradient id="shimF" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#e7e0cf"/><stop offset="0.5" stop-color="#f6f1e2"/><stop offset="1" stop-color="#e7e0cf"/>
    </linearGradient>
    <filter id="softF" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#0d1f17" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="360" height="520" fill="#fbf9f1"/>
  <rect width="360" height="520" fill="url(#dotsF)"/>

  <!-- two refs -> prompt -> output, vertical -->
  <path d="M110 118 C 150 118, 150 168, 186 172" fill="none" stroke="#1e4b38" stroke-opacity="0.5" stroke-width="1.6"/>
  <path d="M250 118 C 230 118, 224 168, 210 172" fill="none" stroke="#1e4b38" stroke-opacity="0.45" stroke-width="1.6" stroke-dasharray="4 5"/>
  <path d="M180 300 C 180 330, 180 330, 180 360" fill="none" stroke="#1e4b38" stroke-opacity="0.45" stroke-width="1.6" stroke-dasharray="4 5"/>

  <!-- ref chips -->
  <g filter="url(#softF)"><rect x="66" y="70" width="78" height="64" rx="8" fill="#fffefb"/><rect x="74" y="78" width="62" height="48" rx="4" fill="#2b5a44"/></g>
  <g filter="url(#softF)"><rect x="216" y="70" width="78" height="64" rx="8" fill="#fffefb"/><rect x="224" y="78" width="62" height="48" rx="4" fill="#b4552c"/></g>

  <!-- prompt -->
  <g filter="url(#softF)">
    <rect x="60" y="176" width="240" height="124" rx="11" fill="#fffefb"/>
    <text x="76" y="200" font-family="Poppins, sans-serif" font-size="10.5" font-weight="700" letter-spacing="0.8" fill="#1e4b38" opacity="0.85">PROMPT</text>
    <rect x="76" y="212" width="208" height="72" rx="7" fill="#1e4b38" opacity="0.06"/>
    <rect x="86" y="224" width="188" height="7" rx="3.5" fill="#1e4b38" opacity="0.55"/>
    <rect x="86" y="238" width="160" height="7" rx="3.5" fill="#1e4b38" opacity="0.4"/>
    <rect x="86" y="252" width="176" height="7" rx="3.5" fill="#1e4b38" opacity="0.28"/>
    <rect x="86" y="266" width="70" height="7" rx="3.5" fill="#1e4b38" opacity="0.2"/>
    <rect x="157" y="265" width="1.8" height="11" fill="#1e4b38"/>
  </g>

  <!-- output -->
  <g filter="url(#softF)">
    <rect x="86" y="360" width="188" height="128" rx="11" fill="#fffefb"/>
    <rect x="98" y="372" width="164" height="104" rx="7" fill="#24523d"/>
    <rect x="98" y="372" width="164" height="40" rx="7" fill="url(#shimF)" opacity="0.85"/>
  </g>

  <!-- cursor -->
  <g transform="translate(232 300)">
    <path d="M0 0 L15 8.5 L6.4 10 L9.6 16 L6.8 17.4 L3.6 11 L0 14.6 Z" fill="#b4552c"/>
    <rect x="13" y="13" width="46" height="18" rx="9" fill="#b4552c"/>
    <text x="22" y="26" font-family="Poppins, sans-serif" font-size="9.5" font-weight="600" fill="#f1ebdc">Client</text>
  </g>

  <path d="M300 300 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 l8 -3 z" fill="#1e4b38" opacity="0.5"/>
</svg>
