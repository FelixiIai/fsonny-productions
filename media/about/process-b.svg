<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <pattern id="dotsB" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.3" cy="1.3" r="1.1" fill="#1e4b38" opacity="0.16"/>
    </pattern>
    <linearGradient id="shimB" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0" stop-color="#e7e0cf"/><stop offset="0.5" stop-color="#f6f1e2"/><stop offset="1" stop-color="#e7e0cf"/>
    </linearGradient>
    <filter id="softB" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#0d1f17" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="400" height="500" fill="#fbf9f1"/>
  <rect width="400" height="500" fill="url(#dotsB)"/>

  <!-- vertical flow: prompt -> output -->
  <path d="M200 210 C 200 250, 200 250, 200 286" fill="none" stroke="#1e4b38" stroke-opacity="0.5" stroke-width="1.6" stroke-dasharray="4 5"/>

  <!-- prompt node -->
  <g filter="url(#softB)">
    <rect x="56" y="70" width="232" height="140" rx="11" fill="#fffefb"/>
    <circle cx="76" cy="94" r="4.2" fill="#1e4b38" opacity="0.4"/>
    <text x="90" y="98" font-family="Poppins, sans-serif" font-size="11" font-weight="700" letter-spacing="0.8" fill="#1e4b38" opacity="0.85">PROMPT</text>
    <rect x="74" y="112" width="196" height="82" rx="7" fill="#1e4b38" opacity="0.06"/>
    <rect x="84" y="124" width="176" height="7.5" rx="3.75" fill="#1e4b38" opacity="0.55"/>
    <rect x="84" y="139" width="150" height="7.5" rx="3.75" fill="#1e4b38" opacity="0.42"/>
    <rect x="84" y="154" width="166" height="7.5" rx="3.75" fill="#1e4b38" opacity="0.3"/>
    <rect x="84" y="169" width="96" height="7.5" rx="3.75" fill="#1e4b38" opacity="0.22"/>
    <rect x="181" y="168" width="2" height="12" fill="#1e4b38"/>
  </g>

  <!-- output node -->
  <g filter="url(#softB)">
    <rect x="96" y="286" width="208" height="176" rx="11" fill="#fffefb"/>
    <text x="110" y="308" font-family="Poppins, sans-serif" font-size="10" font-weight="700" letter-spacing="0.8" fill="#1e4b38" opacity="0.85">OUTPUT</text>
    <rect x="110" y="318" width="180" height="130" rx="7" fill="#24523d"/>
    <rect x="110" y="318" width="180" height="52" rx="7" fill="url(#shimB)" opacity="0.85"/>
    <text x="128" y="390" font-family="Poppins, sans-serif" font-size="8.5" font-weight="600" letter-spacing="1" fill="#1e4b38" opacity="0.5">GENERATING</text>
  </g>

  <!-- cursor -->
  <g transform="translate(250 236)">
    <path d="M0 0 L15 8.5 L6.4 10 L9.6 16 L6.8 17.4 L3.6 11 L0 14.6 Z" fill="#1e4b38"/>
    <rect x="13" y="13" width="56" height="18" rx="9" fill="#1e4b38"/>
    <text x="22" y="26" font-family="Poppins, sans-serif" font-size="9.5" font-weight="600" fill="#f1ebdc">F.Sonny</text>
  </g>

  <path d="M320 60 l3.4 9 l9 3.4 l-9 3.4 l-3.4 9 l-3.4 -9 l-9 -3.4 l9 -3.4 z" fill="#1e4b38" opacity="0.5"/>
</svg>
